name: Release Public Beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: package.json version without leading v
        required: true
        type: string
      change_summary:
        description: short summary of what changed in this release
        required: true
        type: string
      breaking_changes:
        description: breaking changes or migration notes; use "なし" if none
        required: true
        default: なし
        type: string
      prerelease:
        description: mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-public-beta
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Ensure main branch
        run: |
          test "$GITHUB_REF_NAME" = "main" || {
            echo "This workflow must be run from main."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$PACKAGE_VERSION" = "$RELEASE_VERSION" || {
            echo "package.json version ($PACKAGE_VERSION) does not match workflow input ($RELEASE_VERSION)."
            exit 1
          }

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Test
        run: npm test

      - name: Build Public Beta artifacts
        run: npm run build:release:mac

      - name: Verify release files
        run: |
          test -f "release/NewsVideo-${RELEASE_VERSION}-arm64.dmg"
          test -f "release/NewsVideo-${RELEASE_VERSION}-arm64.dmg.blockmap"
          test -f "release/NewsVideo-${RELEASE_VERSION}-arm64-mac.zip"
          test -f "release/NewsVideo-${RELEASE_VERSION}-arm64-mac.zip.blockmap"
          test -f "release/latest-mac.yml"

      - name: Prepare release notes
        run: |
          node scripts/render-public-beta-release-notes.mjs \
            --version "$RELEASE_VERSION" \
            --change-summary "${{ inputs.change_summary }}" \
            --breaking-changes "${{ inputs.breaking_changes }}" \
            --commit-sha "$GITHUB_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --output release/release-notes.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NewsVideo-${{ inputs.version }}-public-beta-release
          if-no-files-found: error
          path: |
            release/NewsVideo-${{ inputs.version }}-arm64.dmg
            release/NewsVideo-${{ inputs.version }}-arm64.dmg.blockmap
            release/NewsVideo-${{ inputs.version }}-arm64-mac.zip
            release/NewsVideo-${{ inputs.version }}-arm64-mac.zip.blockmap
            release/latest-mac.yml

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ inputs.version }}
          RELEASE_TITLE: NewsVideo v${{ inputs.version }} Public Beta
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          assets=(
            "release/NewsVideo-${RELEASE_VERSION}-arm64.dmg"
            "release/NewsVideo-${RELEASE_VERSION}-arm64.dmg.blockmap"
            "release/NewsVideo-${RELEASE_VERSION}-arm64-mac.zip"
            "release/NewsVideo-${RELEASE_VERSION}-arm64-mac.zip.blockmap"
            "release/latest-mac.yml"
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

            edit_args=(
              "$RELEASE_TAG"
              --title "$RELEASE_TITLE"
              --notes-file release/release-notes.md
              --latest
            )

            if [ "$PRERELEASE" = "true" ]; then
              edit_args+=(--prerelease)
            fi

            gh release edit "${edit_args[@]}"
          else
            create_args=(
              "$RELEASE_TAG"
              "${assets[@]}"
              --title "$RELEASE_TITLE"
              --notes-file release/release-notes.md
              --target "$GITHUB_SHA"
              --latest
            )

            if [ "$PRERELEASE" = "true" ]; then
              create_args+=(--prerelease)
            fi

            gh release create "${create_args[@]}"
          fi

          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq '.id')"
          printf '{"prerelease": %s, "make_latest": "true"}' "$PRERELEASE" | \
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              --input - \
              >/dev/null
